<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Schafkopf - ZK der SED</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Russo+One&display=swap');

        :root {
            --ddr-grey: #e0e0d1; /* Vergilbtes Papier / Beton */
            --ddr-red: #cc0000;
            --ddr-mustard: #e6b800;
            --ddr-blue: #0066cc; /* FDJ Blau */
            --concrete: #2c2c2c;
        }

        body {
            background-color: #2a2a2a;
            /* Beton-Look */
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            font-family: 'Courier Prime', monospace; /* Stasi-Akte Style */
            color: var(--ddr-grey);
        }

        .font-propaganda { font-family: 'Russo One', sans-serif; }
        
        /* Stempel-Effekt für Boxen */
        .paper-border {
            border: 2px solid #555;
            background-color: #333;
            box-shadow: 4px 4px 0px 0px #111;
        }

        .stamp-box {
            border: 2px solid var(--ddr-red);
            color: var(--ddr-red);
            transform: rotate(-2deg);
            display: inline-block;
            padding: 2px 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%'><filter id='noise'><feTurbulence type='fractalNoise' baseFrequency='0.5' numOctaves='1' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23noise)' opacity='0.5'/></svg>");
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #555; border: 1px solid #000; }

        .ampel-walk {
            animation: walk 1s steps(2) infinite;
        }
        @keyframes walk { 0% { transform: rotate(0deg); } 50% { transform: rotate(5deg); } }
    </style>
</head>
<body class="min-h-screen pb-24">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- OST-BERLIN ICONS ---
        
        const AmpelManGreen = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="currentColor" className={className}>
                <path d="M12 2C10 2 9 3 9 4H15C15 3 14 2 12 2M10 5H14V7H16L17 11H14V14H16L18 22H15L14 16H10L9 22H6L8 14H6V11H7L8 7V5H10Z" />
            </svg>
        );

        const AmpelManRed = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="currentColor" className={className}>
                <path d="M12 2C10 2 9 3 9 4H15C15 3 14 2 12 2M8 5H16V9H19L18 12H15V22H13V14H11V22H9H9L6 12H5L6 9V5H8Z" />
            </svg>
        );

        const TrabiIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M3 12h18l-2-5H5l-2 5z" />
                <rect x="3" y="12" width="18" height="6" rx="2" />
                <circle cx="6" cy="18" r="2" />
                <circle cx="18" cy="18" r="2" />
                <path d="M6 12v-2" /><path d="M18 12v-2" />
            </svg>
        );

        const TvTower = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="12" y1="2" x2="12" y2="22" />
                <circle cx="12" cy="8" r="3" />
                <path d="M9 22h6" />
                <path d="M12 11l-4 11" /><path d="M12 11l4 11" />
            </svg>
        );

        // --- COMPONENTS ---

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
            const border = type === 'error' ? 'border-red-600 text-red-400' : 'border-green-600 text-green-400';
            
            return (
                <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-6 py-4 bg-[#222] border-l-4 shadow-xl font-mono text-xs uppercase tracking-wider flex items-center gap-3 ${border}`}>
                    <div className="bg-white/10 p-1 rounded">{type === 'error' ? '⚠️ MELDUNG' : '⭐ BEKANNTMACHUNG'}</div>
                    {message}
                </div>
            );
        };

        function App() {
            const [ready, setReady] = useState(false);
            const [players, setPlayers] = useState([]);
            const [gameHistory, setGameHistory] = useState([]);
            
            const [name, setName] = useState('');
            const [winners, setWinners] = useState([]);
            const [losers, setLosers] = useState([]);
            const [points, setPoints] = useState('10');
            const [mode, setMode] = useState('normal'); 
            const [gameCount, setGameCount] = useState(0);
            const [toast, setToast] = useState(null); 

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.Recharts) { setReady(true); clearInterval(check); }
                }, 100);
                return () => clearInterval(check);
            }, []);

            useEffect(() => {
                try {
                    const p = localStorage.getItem('ddr_sk_players');
                    const c = localStorage.getItem('ddr_sk_count');
                    const gh = localStorage.getItem('ddr_sk_history');
                    if (p) setPlayers(JSON.parse(p));
                    if (c) setGameCount(parseInt(c));
                    if (gh) setGameHistory(JSON.parse(gh));
                } catch (e) {}
            }, []);

            useEffect(() => {
                if (players.length > 0 || gameCount > 0) {
                    localStorage.setItem('ddr_sk_players', JSON.stringify(players));
                    localStorage.setItem('ddr_sk_count', gameCount.toString());
                    localStorage.setItem('ddr_sk_history', JSON.stringify(gameHistory));
                }
            }, [players, gameCount, gameHistory]);

            const stats = useMemo(() => {
                if (players.length === 0) return null;
                let soloKing = { name: 'Niemand', count: 0 };
                let highRoller = { name: 'Keiner', val: 0 };
                let pechvogel = { name: 'Keiner', val: 0 };

                const soloCounts = {};
                gameHistory.forEach(game => {
                    if (game.mode === 'solo') {
                        game.winners.forEach(winner => {
                            soloCounts[winner] = (soloCounts[winner] || 0) + 1;
                        });
                    }
                });
                Object.entries(soloCounts).forEach(([name, count]) => {
                    if (count > soloKing.count) soloKing = { name, count };
                });

                players.forEach(p => {
                    if (p.history.length > 1) {
                        for (let i = 1; i < p.history.length; i++) {
                            const diff = p.history[i].val - p.history[i-1].val;
                            if (diff > highRoller.val) highRoller = { name: p.name, val: diff };
                            if (diff < pechvogel.val) pechvogel = { name: p.name, val: diff };
                        }
                    }
                });
                return { soloKing, highRoller, pechvogel };
            }, [players, gameHistory]);

            const showToast = (msg, type = 'success') => setToast({ msg, type });

            const triggerConfetti = () => {
                window.confetti({
                    particleCount: 100,
                    spread: 70,
                    colors: ['#000000', '#FF0000', '#FFCC00'], // Schwarz-Rot-Gold
                    origin: { y: 0.6 }
                });
            };

            const addPlayer = () => {
                if (!name.trim() || players.length >= 6) return showToast("Kollektiv ist voll!", "error");
                setPlayers([...players, { name: name.trim(), points: 0, history: [{ round: 0, val: 0 }] }]);
                setName('');
            };

            const kickPlayer = (idx) => {
                if (confirm(`Genosse ${players[idx].name} wegen Republikflucht ausschließen?`)) {
                    setPlayers(players.filter((_, i) => i !== idx));
                    setWinners([]); setLosers([]);
                }
            };

            const toggleWinner = (pName) => {
                if (losers.includes(pName)) return;
                setWinners(prev => prev.includes(pName) ? prev.filter(x => x !== pName) : [...prev, pName]);
            };

            const toggleLoser = (pName) => {
                if (winners.includes(pName)) return;
                setLosers(prev => prev.includes(pName) ? prev.filter(x => x !== pName) : [...prev, pName]);
            };

            const recordGame = () => {
                const val = parseInt(points);
                if (mode === 'normal' && (winners.length !== 2 || losers.length !== 2)) return showToast("Unvollständiges Kollektiv!", "error");
                if (mode === 'solo' && !((winners.length === 1 && losers.length === 3) || (winners.length === 3 && losers.length === 1))) return showToast("Solo-Antrag fehlerhaft!", "error");

                const nextRound = gameCount + 1;
                const newGameEntry = { round: nextRound, mode, winners, losers, points: val };
                setGameHistory([...gameHistory, newGameEntry]);

                const newPlayers = players.map(p => {
                    let change = 0;
                    if (mode === 'normal') {
                        if (winners.includes(p.name)) change = val;
                        if (losers.includes(p.name)) change = -val;
                    } else {
                        if (winners.length === 1 && winners.includes(p.name)) change = val * 3;
                        else if (winners.length === 1 && losers.includes(p.name)) change = -val;
                        if (losers.length === 1 && losers.includes(p.name)) change = -(val * 3);
                        else if (losers.length === 1 && winners.includes(p.name)) change = val;
                    }
                    return { ...p, points: p.points + change, history: [...p.history, { round: nextRound, val: p.points + change }] };
                });

                setPlayers(newPlayers);
                setGameCount(nextRound);
                setWinners([]); setLosers([]);
                triggerConfetti();
                showToast("Planerfüllung bestätigt!");
            };

            const undoLast = () => {
                if (gameCount === 0) return;
                if (confirm("Revision beantragen?")) {
                    const prevRound = gameCount - 1;
                    setGameHistory(gameHistory.filter(g => g.round <= prevRound));
                    setPlayers(players.map(p => ({
                        ...p,
                        history: p.history.filter(h => h.round <= prevRound),
                        points: (p.history.find(h => h.round === prevRound) || {val: 0}).val
                    })));
                    setGameCount(prevRound);
                    showToast("Eintrag revidiert.");
                }
            };

            if (!ready) return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-[#2a2a2a] text-[#e0e0d1] font-mono space-y-4">
                    <div className="border-2 border-red-600 p-4 animate-pulse uppercase font-bold tracking-widest text-red-500">
                        Antrag wird bearbeitet...
                    </div>
                </div>
            );

            const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

            const chartData = Array.from({ length: gameCount + 1 }, (_, i) => {
                const row = { name: i };
                players.forEach(p => {
                    const entry = p.history.find(h => h.round === i) || [...p.history].reverse().find(h => h.round < i);
                    row[p.name] = entry ? entry.val : 0;
                });
                return row;
            });

            return (
                <div className="max-w-4xl mx-auto p-4 space-y-8">
                    {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}

                    {/* HEADER */}
                    <header className="flex flex-col items-center py-6 border-b-2 border-dashed border-[#555]">
                        <div className="flex items-center gap-4">
                            <div className="border-2 border-[#e6b800] p-2 rounded-full">
                                <TvTower className="w-10 h-10 text-[#e6b800]" />
                            </div>
                            <div className="text-center">
                                <h1 className="text-3xl md:text-5xl font-propaganda text-[#e0e0d1] uppercase tracking-wider">
                                    ZK der <span className="text-[#cc0000]">Schafköpfe</span>
                                </h1>
                                <p className="font-mono text-xs text-[#888] tracking-[0.3em] uppercase mt-1">Sektion Ost-Berlin</p>
                            </div>
                            <div className="border-2 border-[#e6b800] p-2 rounded-full">
                                <TrabiIcon className="w-10 h-10 text-[#e6b800]" />
                            </div>
                        </div>
                    </header>

                    {/* HALL OF FAME (DDR STYLE) */}
                    <div className="grid grid-cols-3 gap-4">
                        <div className="paper-border p-4 relative group">
                            <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-[#2a2a2a] px-2">
                                <span className="text-[10px] text-[#888] uppercase tracking-widest">Held der Arbeit</span>
                            </div>
                            <div className="flex flex-col items-center mt-2">
                                <div className="text-2xl font-bold text-[#e6b800]">{stats?.soloKing.name}</div>
                                <div className="text-[10px] text-[#666] mt-1">{stats?.soloKing.count} Soli erfüllt</div>
                            </div>
                        </div>
                        <div className="paper-border p-4 relative group">
                            <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-[#2a2a2a] px-2">
                                <span className="text-[10px] text-[#888] uppercase tracking-widest">Devisen-Horter</span>
                            </div>
                            <div className="flex flex-col items-center mt-2">
                                <div className="text-2xl font-bold text-[#0066cc]">{stats?.highRoller.name}</div>
                                <div className="text-[10px] text-[#666] mt-1">+{stats?.highRoller.val} Mark</div>
                            </div>
                        </div>
                        <div className="paper-border p-4 relative group">
                            <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-[#2a2a2a] px-2">
                                <span className="text-[10px] text-[#cc0000] uppercase tracking-widest">Klassenfeind</span>
                            </div>
                            <div className="flex flex-col items-center mt-2">
                                <div className="text-2xl font-bold text-[#cc0000]">{stats?.pechvogel.name}</div>
                                <div className="text-[10px] text-[#666] mt-1">{stats?.pechvogel.val} Mark Miese</div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {/* DAS KOLLEKTIV (SPIELER) */}
                        <div className="paper-border p-6 bg-[#2a2a2a] relative">
                            <div className="stamp-box absolute top-4 right-4 rotate-12 text-xs">VS - Vertraulich</div>
                            <h2 className="text-sm font-bold uppercase text-[#888] border-b border-[#444] pb-2 mb-4 tracking-widest">Das Kollektiv</h2>
                            
                            <div className="space-y-3">
                                {players.map((p, i) => (
                                    <div key={i} className="flex justify-between items-center border border-[#444] p-2 bg-[#222]">
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => kickPlayer(i)} className="text-[#444] hover:text-[#cc0000] font-mono text-xs">[X]</button>
                                            
                                            {/* Trabi-Farben Avatare */}
                                            <div className={`w-8 h-8 flex items-center justify-center font-bold text-xs text-black border border-white/20 shadow-inner ${['bg-[#789f58]', 'bg-[#6a9bc3]', 'bg-[#e5dcb3]', 'bg-[#a63d40]'][i % 4]}`}>
                                                {p.name.substring(0,2).toUpperCase()}
                                            </div>
                                            
                                            <span className="font-bold text-[#ccc] font-mono">{p.name}</span>
                                        </div>
                                        <div className={`font-mono font-bold ${p.points >= 0 ? 'text-[#e6b800]' : 'text-[#cc0000]'}`}>
                                            {(p.points / 100).toFixed(2)} M
                                        </div>
                                    </div>
                                ))}
                                
                                {players.length < 6 && (
                                    <div className="flex gap-2 pt-2 mt-2 border-t border-dashed border-[#444]">
                                        <input 
                                            className="flex-1 bg-[#222] border border-[#444] text-[#ddd] font-mono px-3 py-2 text-sm focus:border-[#e6b800] outline-none placeholder-[#555]" 
                                            value={name} 
                                            onChange={e => setName(e.target.value)} 
                                            onKeyDown={e => e.key === 'Enter' && addPlayer()}
                                            placeholder="Genosse..." 
                                        />
                                        <button onClick={addPlayer} className="bg-[#444] text-[#ddd] px-3 text-xs hover:bg-[#555] uppercase border border-[#666]">
                                            Aufnehmen
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* BEFEHLSZENTRALE */}
                        <div className="space-y-6">
                            <div className="flex gap-4">
                                <button onClick={() => {setMode('normal'); setWinners([]); setLosers([]);}} className={`flex-1 paper-border py-4 font-bold uppercase text-xs tracking-widest transition-all ${mode === 'normal' ? 'border-[#e6b800] text-[#e6b800]' : 'text-[#666]'}`}>
                                    Sauspiel
                                </button>
                                <button onClick={() => {setMode('solo'); setWinners([]); setLosers([]);}} className={`flex-1 paper-border py-4 font-bold uppercase text-xs tracking-widest transition-all ${mode === 'solo' ? 'border-[#cc0000] text-[#cc0000]' : 'text-[#666]'}`}>
                                    Solo
                                </button>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-2">
                                    <div className="flex justify-center mb-2"><AmpelManGreen className="w-8 h-8 text-[#00cc00]" /></div>
                                    <div className="flex flex-col gap-2">
                                        {players.map(p => (
                                            <button key={p.name} onClick={() => toggleWinner(p.name)} className={`py-2 px-2 text-xs font-mono border-l-2 transition-all bg-[#222] text-left hover:bg-[#333] ${winners.includes(p.name) ? 'border-[#00cc00] text-[#00cc00] bg-[#00cc00]/10 pl-4' : 'border-[#444] text-[#666]'}`}>
                                                {p.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <div className="flex justify-center mb-2"><AmpelManRed className="w-8 h-8 text-[#cc0000]" /></div>
                                    <div className="flex flex-col gap-2">
                                        {players.map(p => (
                                            <button key={p.name} onClick={() => toggleLoser(p.name)} className={`py-2 px-2 text-xs font-mono border-l-2 transition-all bg-[#222] text-left hover:bg-[#333] ${losers.includes(p.name) ? 'border-[#cc0000] text-[#cc0000] bg-[#cc0000]/10 pl-4' : 'border-[#444] text-[#666]'}`}>
                                                {p.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-4 items-stretch pt-2">
                                <div className="relative w-24">
                                    <span className="absolute top-2 left-2 text-[8px] text-[#666] uppercase">Tarif</span>
                                    <input type="number" className="w-full h-full bg-[#1a1a1a] border border-[#444] text-[#e6b800] font-mono text-xl text-center focus:border-[#e6b800] outline-none" value={points} onChange={e => setPoints(e.target.value)} />
                                </div>
                                <button onClick={recordGame} className="flex-1 bg-[#cc0000] text-[#e0e0d1] font-bold text-lg hover:bg-[#aa0000] shadow-lg border-b-4 border-[#880000] active:border-b-0 active:translate-y-1 transition-all uppercase tracking-widest">
                                    Melden
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 5-JAHRES-PLAN (Graph) */}
                    {gameCount > 0 && (
                        <div className="paper-border p-4 mt-8">
                            <div className="flex justify-between items-center mb-4 border-b border-[#444] pb-2">
                                <h3 className="text-xs font-bold uppercase tracking-widest text-[#888]">5-Jahres-Plan (Verlauf)</h3>
                                <div className="text-[10px] text-[#444]">VEB Statistik</div>
                            </div>
                            <div className="h-64 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={chartData}>
                                        <CartesianGrid strokeDasharray="4 4" stroke="#333" vertical={false} />
                                        <XAxis dataKey="name" stroke="#555" fontSize={10} axisLine={false} tickLine={false} tickMargin={10} />
                                        <YAxis stroke="#555" fontSize={10} axisLine={false} tickLine={false} tickFormatter={v => `${(v/100).toFixed(0)}`} />
                                        <Tooltip 
                                            contentStyle={{ backgroundColor: '#222', border: '1px solid #555', color: '#ddd', fontFamily: 'monospace' }}
                                            itemStyle={{ fontSize: '12px' }}
                                        />
                                        {players.map((p, i) => (
                                            <Line 
                                                key={p.name} 
                                                type="step" 
                                                dataKey={p.name} 
                                                stroke={['#789f58', '#6a9bc3', '#e5dcb3', '#a63d40', '#d4a017'][i % 5]} 
                                                strokeWidth={2} 
                                                dot={false}
                                                activeDot={{ r: 4, fill: '#fff' }}
                                            />
                                        ))}
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    )}
                    
                    <footer className="text-center text-[10px] text-[#444] mt-12 font-mono">
                        Für Frieden und Sozialismus • {new Date().getFullYear()}
                        <div className="flex gap-4 justify-center mt-2">
                             <button onClick={undoLast} className="hover:text-[#e6b800] underline">Eingabe revidieren</button>
                             <button onClick={() => {if(confirm("System neu starten?")) { localStorage.clear(); location.reload(); }}} className="hover:text-[#cc0000] underline">System-Reset</button>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
