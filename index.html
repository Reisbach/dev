<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/e/ec/Flag_of_Berlin.svg">
    <title>Schafkopf – Berlin Edition</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .font-heading { font-family: 'Space Grotesk', sans-serif; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
</style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-emerald-950 text-slate-100 min-h-screen selection:bg-emerald-500/30 antialiased">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center space-y-4">
                <div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto shadow-[0_0_20px_rgba(16,185,129,0.3)]"></div>
                <p class="text-emerald-400 font-bold uppercase tracking-widest text-xs font-heading">System wird kalibriert...</p>
            </div>
        </div>
    </div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://hutbxkqhhgetbvnuqwce.supabase.co";
        const SUPABASE_KEY = "sb_publishable_reklbPGGESN7V2aAL059xQ_ib3jopaQ";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ── localStorage helpers for recent rooms ──────────────────────────
        const RECENT_ROOMS_KEY = 'schafkopf_recent_rooms';
        const LAST_ROOM_KEY    = 'schafkopf_last_room';
        function getRecentRooms() {
            try { return JSON.parse(localStorage.getItem(RECENT_ROOMS_KEY) || '[]'); } catch { return []; }
        }
        function saveRecentRoom(code) {
            const rooms = getRecentRooms().filter(r => r !== code);
            rooms.unshift(code);
            localStorage.setItem(RECENT_ROOMS_KEY, JSON.stringify(rooms.slice(0, 3)));
        }

        function generateRoomCode() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            return code;
        }
        function generateOwnerToken() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        // Default points per mode
        const DEFAULT_POINTS = { normal: '20', solo: '50' };

        function App() {
            const [ready, setReady] = useState(false);
            const [roomCode, setRoomCode] = useState(() => localStorage.getItem(LAST_ROOM_KEY) || "");
            const [inputCode, setInputCode] = useState("");
            const [isOwner, setIsOwner] = useState(false);
            const [players, setPlayers] = useState([]);
            const [name, setName] = useState('');
            const [winners, setWinners] = useState([]);
            const [losers, setLosers] = useState([]);
            const [points, setPoints] = useState(DEFAULT_POINTS.normal);
            const [mode, setMode] = useState('normal');
            const [gameCount, setGameCount] = useState(0);
            const [gameLogs, setGameLogs] = useState([]);
            const [recentRooms, setRecentRooms] = useState([]);
            const playerInputRef = useRef(null);

            useEffect(() => {
                setRecentRooms(getRecentRooms());
                const check = setInterval(() => {
                    if (window.Recharts && window.Recharts.LineChart) {
                        setReady(true);
                        clearInterval(check);
                    }
                }, 100);
                return () => clearInterval(check);
            }, []);

            useEffect(() => {
                if (!roomCode) return;

                const applyData = (data) => {
                    if (!data) return;
                    setGameCount(data.game_count);
                    setPlayers(data.players || []);
                    setGameLogs(data.game_logs || []);
                    const savedToken = localStorage.getItem(`schafkopf_owner_${roomCode}`);
                    setIsOwner(savedToken === data.owner_token);
                };

                const fetchState = async () => {
                    const { data } = await supabase.from('schafkopf_sessions').select('*').eq('room_code', roomCode).maybeSingle();
                    applyData(data);
                };
                fetchState();

                const channel = supabase
                    .channel(`room_${roomCode}`)
                    .on('postgres_changes', {
                        event: 'UPDATE',
                        schema: 'public',
                        table: 'schafkopf_sessions',
                        filter: `room_code=eq.${roomCode}`
                    }, (payload) => {
                        applyData(payload.new);
                    })
                    .subscribe((status) => {
                        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
                            console.warn('Realtime nicht verfügbar, aktiviere Polling...');
                        }
                    });

                const poll = setInterval(fetchState, 3000);

                return () => {
                    supabase.removeChannel(channel);
                    clearInterval(poll);
                };
            }, [roomCode]);

            const saveToSupabase = async (nextPlayers, nextCount, nextLogs) => {
                if (!isOwner || !roomCode) return;
                const token = localStorage.getItem(`schafkopf_owner_${roomCode}`);
                await supabase
                    .from('schafkopf_sessions')
                    .update({ players: nextPlayers, game_count: nextCount, game_logs: nextLogs })
                    .eq('room_code', roomCode)
                    .eq('owner_token', token);
            };

            const enterRoom = (code) => {
                saveRecentRoom(code);
                setRecentRooms(getRecentRooms());
                localStorage.setItem(LAST_ROOM_KEY, code);
                setRoomCode(code);
            };

            const handleCreateRoom = async () => {
                const newCode = generateRoomCode();
                const token = generateOwnerToken();
                const { error } = await supabase.from('schafkopf_sessions').insert([{ room_code: newCode, game_count: 0, players: [], game_logs: [], owner_token: token }]);
                if (!error) {
                    localStorage.setItem(`schafkopf_owner_${newCode}`, token);
                    setIsOwner(true);
                    enterRoom(newCode);
                }
            };

            const handleJoinRoom = async (e) => {
                e && e.preventDefault();
                const cleanCode = inputCode.trim().toLowerCase();
                if (cleanCode.length !== 6) return;
                const { data } = await supabase.from('schafkopf_sessions').select('room_code, owner_token').eq('room_code', cleanCode).maybeSingle();
                if (data) {
                    const savedToken = localStorage.getItem(`schafkopf_owner_${cleanCode}`);
                    setIsOwner(savedToken === data.owner_token);
                    enterRoom(cleanCode);
                } else {
                    alert("Raum-Code wurde nicht gefunden!");
                }
            };

            const handleJoinRecent = async (code) => {
                const { data } = await supabase.from('schafkopf_sessions').select('room_code, owner_token').eq('room_code', code).maybeSingle();
                if (data) {
                    const savedToken = localStorage.getItem(`schafkopf_owner_${code}`);
                    setIsOwner(savedToken === data.owner_token);
                    enterRoom(code);
                } else {
                    // Room no longer exists – remove from recents
                    const updated = getRecentRooms().filter(r => r !== code);
                    localStorage.setItem(RECENT_ROOMS_KEY, JSON.stringify(updated));
                    setRecentRooms(updated);
                    alert("Dieser Raum existiert nicht mehr.");
                }
            };

            if (!ready) return null;

            const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;

            const addPlayer = () => {
                if (!isOwner) return alert("Nur der Raumbesitzer kann Spieler hinzufügen!");
                if (!name.trim() || players.length >= 6) return;
                const nextPlayers = [...players, { name: name.trim(), points: 0, history: [{ round: 0, val: 0 }] }];
                setPlayers(nextPlayers);
                setName('');
                saveToSupabase(nextPlayers, gameCount, gameLogs);
                // Keep focus on input for quick multi-add
                setTimeout(() => playerInputRef.current && playerInputRef.current.focus(), 0);
            };

            const handlePlayerKeyDown = (e) => {
                if (e.key === 'Enter') addPlayer();
            };

            const kickPlayer = (idx) => {
                if (!isOwner) return alert("Nur der Raumbesitzer kann Spieler entfernen!");
                if (confirm(`${players[idx].name} wirklich entfernen?`)) {
                    const nextPlayers = players.filter((_, i) => i !== idx);
                    setPlayers(nextPlayers);
                    setWinners([]); setLosers([]);
                    saveToSupabase(nextPlayers, gameCount, gameLogs);
                }
            };

            const toggleWinner = (pName) => {
                if (!isOwner) return;
                if (losers.includes(pName)) return;
                if (winners.includes(pName)) {
                    setWinners(winners.filter(x => x !== pName));
                } else {
                    if (mode === 'normal' && winners.length < 2) setWinners([...winners, pName]);
                    if (mode === 'solo' && (winners.length + losers.length < 4) && winners.length < 3) setWinners([...winners, pName]);
                }
            };

            const toggleLoser = (pName) => {
                if (!isOwner) return;
                if (winners.includes(pName)) return;
                if (losers.includes(pName)) {
                    setLosers(losers.filter(x => x !== pName));
                } else {
                    if (mode === 'normal' && losers.length < 2) setLosers([...losers, pName]);
                    if (mode === 'solo' && (winners.length + losers.length < 4) && losers.length < 3) setLosers([...losers, pName]);
                }
            };

            // ── Mode switch: keep selection, update default points ──────────
            const switchMode = (newMode) => {
                if (!isOwner) return;
                setMode(newMode);
                setPoints(DEFAULT_POINTS[newMode]);
                // winners & losers intentionally NOT reset
            };

            const recordGame = () => {
                if (!isOwner) return alert("Nur der Raumbesitzer kann Runden eintragen!");
                const val = parseInt(points);
                if (mode === 'normal' && (winners.length !== 2 || losers.length !== 2)) {
                    return alert("Sauspiel: Wähle genau 2 Gewinner und 2 Verlierer!");
                }
                if (mode === 'solo' && !((winners.length === 1 && losers.length === 3) || (winners.length === 3 && losers.length === 1))) {
                    return alert("Solo: Wähle 1 gegen 3 Spieler!");
                }
                const nextRound = gameCount + 1;
                const roundLogs = [];
                const newPlayers = players.map(p => {
                    let change = 0;
                    if (mode === 'normal') {
                        if (winners.includes(p.name)) change = val;
                        if (losers.includes(p.name)) change = -val;
                    } else {
                        if (winners.length === 1 && winners.includes(p.name)) change = val * 3;
                        else if (winners.length === 1 && losers.includes(p.name)) change = -val;
                        if (losers.length === 1 && losers.includes(p.name)) change = -(val * 3);
                        else if (losers.length === 1 && winners.includes(p.name)) change = val;
                    }
                    if (change !== 0) {
                        roundLogs.push({ name: p.name, change: change, round: nextRound, mode: mode, winners: [...winners], losers: [...losers] });
                    }
                    const newVal = p.points + change;
                    return { ...p, points: newVal, history: [...p.history, { round: nextRound, val: newVal }] };
                });
                const nextLogs = [...gameLogs, ...roundLogs];
                setPlayers(newPlayers);
                setGameCount(nextRound);
                setGameLogs(nextLogs);
                setWinners([]); setLosers([]);
                saveToSupabase(newPlayers, nextRound, nextLogs);
            };

            const undoLast = () => {
                if (!isOwner) return alert("Nur der Raumbesitzer kann Runden löschen!");
                if (gameCount === 0) return;
                if (confirm("Letztes Spiel wirklich rückgängig machen?")) {
                    const prevRound = gameCount - 1;
                    const revertedPlayers = players.map(p => ({
                        ...p,
                        history: p.history.filter(h => h.round <= prevRound),
                        points: (p.history.find(h => h.round === prevRound) || {val: 0}).val
                    }));
                    const revertedLogs = gameLogs.filter(log => log.round <= prevRound);
                    setPlayers(revertedPlayers);
                    setGameCount(prevRound);
                    setGameLogs(revertedLogs);
                    saveToSupabase(revertedPlayers, prevRound, revertedLogs);
                }
            };

            // TOP 5 WINS & LOSSES
            const topWins = [...gameLogs].filter(l => l.change > 0).sort((a, b) => b.change - a.change).slice(0, 5);
            const topLosses = [...gameLogs].filter(l => l.change < 0).sort((a, b) => a.change - b.change).slice(0, 5);

            // ── DUO & SOLO-GEGNER STATISTIKEN ──────────────────────────────
            const duoMap = {};
            const soloMatchupMap = {};
            const uniqueRounds = {};
            gameLogs.forEach(log => {
                if (!uniqueRounds[log.round]) uniqueRounds[log.round] = log;
            });
            Object.values(uniqueRounds).forEach(log => {
                const { round, mode, winners: W, losers: L } = log;
                if (!W || !L) return;
                if (mode === 'normal') {
                    [{ pair: [...W].sort(), won: true }, { pair: [...L].sort(), won: false }].forEach(({ pair, won }) => {
                        if (pair.length !== 2) return;
                        const key = pair.join('|||');
                        if (!duoMap[key]) duoMap[key] = { p1: pair[0], p2: pair[1], games: 0, wins: 0 };
                        duoMap[key].games++;
                        if (won) duoMap[key].wins++;
                    });
                }
                if (mode === 'solo') {
                    let soloist, group, soloWon;
                    if (W.length === 1) { soloist = W[0]; group = L; soloWon = true; }
                    else { soloist = L[0]; group = W; soloWon = false; }
                    group.forEach(opponent => {
                        const [pA, pB] = [soloist, opponent].sort();
                        const key = pA + '|||' + pB;
                        if (!soloMatchupMap[key]) soloMatchupMap[key] = { pA, pB, games: 0, wins_pA: 0, wins_pB: 0 };
                        soloMatchupMap[key].games++;
                        if (soloWon) {
                            if (soloist === pA) soloMatchupMap[key].wins_pA++;
                            else soloMatchupMap[key].wins_pB++;
                        }
                    });
                }
            });
            const duoStats = Object.values(duoMap).sort((a, b) => b.games - a.games);
            const soloMatchups = Object.values(soloMatchupMap).sort((a, b) => b.games - a.games);

            // ── LOBBY VIEW ─────────────────────────────────────────────────
            if (!roomCode) {
                return (
                    <div className="flex items-center justify-center min-h-screen px-4 py-8">
                        <div className="max-w-md w-full p-8 bg-slate-900/60 border border-slate-800 rounded-3xl text-center shadow-2xl backdrop-blur-xl space-y-8 relative overflow-hidden">
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-1 bg-gradient-to-r from-transparent via-emerald-500 to-transparent"></div>
                            <div className="space-y-2">
                                <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300 font-heading tracking-tight uppercase italic">Schafkopf Lobby</h1>
                                <p className="text-slate-400 text-xs tracking-wide">Digitaler Preisskat & Schafkopf Rechner</p>
                            </div>
                            <button onClick={handleCreateRoom} className="w-full bg-gradient-to-r from-emerald-600 to-teal-600 py-4 rounded-xl font-bold hover:from-emerald-500 hover:to-teal-500 shadow-xl shadow-emerald-950/40 transition-all text-xs font-heading uppercase tracking-widest active:scale-[0.99]">
                                Neuen Raum erstellen
                            </button>
                            <div className="relative flex py-2 items-center">
                                <div className="flex-grow border-t border-slate-800"></div>
                                <span className="flex-shrink mx-4 text-[10px] text-slate-500 font-bold uppercase tracking-widest font-heading">Oder Beitreten</span>
                                <div className="flex-grow border-t border-slate-800"></div>
                            </div>
                            <form onSubmit={handleJoinRoom} className="flex flex-col gap-3">
                                <input className="w-full bg-slate-950/80 rounded-xl px-4 py-4 font-mono text-center tracking-widest text-2xl border border-slate-800 outline-none text-emerald-400 focus:border-emerald-500 transition-all placeholder:text-slate-700 placeholder:font-sans placeholder:text-sm placeholder:tracking-normal" maxLength="6" placeholder="Raum-Code (6-stellig)" value={inputCode} onChange={e => setInputCode(e.target.value)} />
                                <button type="submit" className="w-full bg-slate-800 border border-slate-700/60 py-3.5 rounded-xl font-bold hover:bg-slate-700 transition-all text-xs uppercase tracking-widest font-heading">Raum betreten</button>
                            </form>

                            {/* ── LETZTE 3 RÄUME ── */}
                            {recentRooms.length > 0 && (
                                <div className="space-y-3">
                                    <div className="relative flex py-1 items-center">
                                        <div className="flex-grow border-t border-slate-800/60"></div>
                                        <span className="flex-shrink mx-4 text-[10px] text-slate-600 font-bold uppercase tracking-widest font-heading">Zuletzt besucht</span>
                                        <div className="flex-grow border-t border-slate-800/60"></div>
                                    </div>
                                    <div className="flex flex-col gap-2">
                                        {recentRooms.map((code) => {
                                            const isOwnRoom = !!localStorage.getItem(`schafkopf_owner_${code}`);
                                            return (
                                                <button
                                                    key={code}
                                                    onClick={() => handleJoinRecent(code)}
                                                    className="flex items-center justify-between w-full bg-slate-950/60 border border-slate-800/60 hover:border-slate-700 px-4 py-3 rounded-xl transition-all group"
                                                >
                                                    <div className="flex items-center gap-3">
                                                        <span className={`w-2 h-2 rounded-full ${isOwnRoom ? 'bg-emerald-500' : 'bg-blue-500'}`}></span>
                                                        <span className="font-mono text-emerald-400 font-bold tracking-widest text-sm">{code}</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-[10px] text-slate-600 font-heading uppercase tracking-wider">{isOwnRoom ? '👑 Admin' : '👀 Zuschauer'}</span>
                                                        <span className="text-slate-600 group-hover:text-slate-400 transition-colors text-xs">→</span>
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            const chartData = Array.from({ length: gameCount + 1 }, (_, i) => {
                const row = { name: `R${i}` };
                players.forEach(p => {
                    const entry = p.history.find(h => h.round === i) || [...p.history].reverse().find(h => h.round < i);
                    row[p.name] = entry ? entry.val : 0;
                });
                return row;
            });

            // ── MAIN DASHBOARD VIEW ────────────────────────────────────────
            return (
                <div className="max-w-5xl mx-auto p-4 md:p-6 space-y-6 pb-24">
                    <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 py-6 border-b border-slate-800/60">
                        <div>
                            <h1 className="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-200 font-heading tracking-tight italic uppercase">SCHAFKOPF <span className="text-xs font-sans tracking-normal not-italic font-semibold text-slate-400 bg-slate-800/60 border border-slate-700 px-2.5 py-1 rounded-full ml-2">Berlin Ed.</span></h1>
                            <div className="text-[10px] font-heading text-slate-400 mt-1.5 uppercase tracking-wider flex items-center gap-2">
                                RAUM: <span className="text-amber-400 font-bold font-mono text-xs">{roomCode}</span>
                                <span className={`h-2 w-2 rounded-full ${isOwner ? 'bg-emerald-500 animate-pulse' : 'bg-blue-500'}`}></span>
                                <span className="text-slate-500">{isOwner ? "👑 Admin-Modus" : "👀 Zuschauer-Modus"}</span>
                            </div>
                        </div>
                        <div className="flex gap-2 w-full sm:w-auto">
                            {isOwner && <button onClick={undoLast} className="flex-1 sm:flex-none text-[10px] font-heading font-bold text-amber-400 border border-amber-500/20 px-4 py-2 rounded-xl bg-amber-500/5 hover:bg-amber-500/10 tracking-wider uppercase transition-all">Rückgängig</button>}
                            <button onClick={() => { localStorage.removeItem(LAST_ROOM_KEY); setRoomCode(""); setWinners([]); setLosers([]); }} className="flex-1 sm:flex-none text-[10px] font-heading font-bold text-slate-400 border border-slate-800 px-4 py-2 rounded-xl bg-slate-900/40 hover:bg-slate-800 tracking-wider uppercase transition-all">Verlassen</button>
                            {isOwner && <button onClick={async () => { if(confirm("Gesamten Raum in DB löschen?")) { await supabase.from('schafkopf_sessions').delete().eq('room_code', roomCode); localStorage.removeItem(`schafkopf_owner_${roomCode}`); localStorage.removeItem(LAST_ROOM_KEY); location.reload(); }}} className="flex-1 sm:flex-none text-[10px] font-heading font-bold text-red-400 border border-red-500/20 px-4 py-2 rounded-xl bg-red-500/5 hover:bg-red-500/10 tracking-wider uppercase transition-all">Reset</button>}
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                        {/* SPIELER-LISTE */}
                        <div className="md:col-span-5 bg-slate-900/40 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-slate-800/60 space-y-4 flex flex-col justify-between">
                            <div className="space-y-4">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-xs font-heading font-bold uppercase text-slate-400 tracking-widest">Kader / Live-Konten</h2>
                                    <div className="flex items-center gap-2">
                                        {players.length > 0 && (
                                            <span className="text-[10px] font-mono text-amber-400 flex items-center gap-1">
                                                <span className="w-1.5 h-1.5 rounded-full bg-amber-400 inline-block"></span>
                                                {players[gameCount % players.length]?.name}
                                            </span>
                                        )}
                                        <span className="text-[10px] font-mono text-slate-500">{players.length}/6</span>
                                    </div>
                                </div>
                                {isOwner && players.length < 6 && (
                                    <div className="flex gap-2">
                                        <input
                                            ref={playerInputRef}
                                            className="flex-1 bg-slate-950 rounded-xl px-4 py-2.5 outline-none border border-slate-800 focus:border-emerald-500 text-sm transition-colors text-slate-200"
                                            value={name}
                                            onChange={e => setName(e.target.value)}
                                            onKeyDown={handlePlayerKeyDown}
                                            placeholder="Neuer Spielername..."
                                        />
                                        <button onClick={addPlayer} className="bg-emerald-600 px-5 rounded-xl font-bold hover:bg-emerald-500 shadow-lg shadow-emerald-900/20 active:scale-95 transition-all text-lg">+</button>
                                    </div>
                                )}
                                <div className="space-y-2 max-h-[320px] overflow-y-auto pr-1">
                                    {players.length === 0 ? (
                                        <p className="text-xs text-slate-500 italic text-center py-8">Noch keine Spieler im Kader.</p>
                                    ) : players.map((p, i) => (
                                        <div key={i} className={`flex justify-between items-center p-3.5 rounded-xl border group transition-all ${i === gameCount % players.length ? 'bg-amber-500/5 border-amber-500/30 hover:border-amber-500/50' : 'bg-slate-950/50 border-slate-900 hover:border-slate-800'}`}>
                                            <div className="flex items-center gap-2">
                                                {isOwner && <button onClick={() => kickPlayer(i)} className="text-slate-600 hover:text-red-400 font-bold px-1 transition-colors">✕</button>}
                                                <span className="font-bold text-slate-300 text-sm">{p.name}</span>
                                                {i === gameCount % players.length && (
                                                    <span className="text-[9px] font-heading font-black uppercase tracking-wider px-1.5 py-0.5 rounded-md bg-amber-500/15 text-amber-400 border border-amber-500/25">Gibt</span>
                                                )}
                                            </div>
                                            <span className={`font-mono font-bold px-3 py-1 text-xs rounded-lg shadow-sm ${p.points >= 0 ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/10' : 'bg-red-500/10 text-red-400 border border-red-500/10'}`}>
                                                {(p.points / 100).toFixed(2)}€
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* RECHNER TOOL */}
                        <div className="md:col-span-7 bg-slate-900/40 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-slate-800/60 space-y-6">
                            <div className="flex bg-slate-950 p-1.5 rounded-2xl border border-slate-800">
                                <button onClick={() => switchMode('normal')} className={`flex-1 py-2.5 rounded-xl text-xs font-heading font-bold transition-all duration-300 ${mode === 'normal' ? 'bg-gradient-to-r from-emerald-600 to-teal-600 shadow-lg text-white' : 'text-slate-500 hover:text-slate-400'}`}>Sauspiel</button>
                                <button onClick={() => switchMode('solo')} className={`flex-1 py-2.5 rounded-xl text-xs font-heading font-bold transition-all duration-300 ${mode === 'solo' ? 'bg-gradient-to-r from-purple-600 to-indigo-600 shadow-lg text-white' : 'text-slate-500 hover:text-slate-400'}`}>Solo</button>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-3">
                                    <p className="text-[10px] text-emerald-400 font-heading font-black uppercase text-center tracking-widest">Gewinner</p>
                                    <div className="flex flex-col gap-1.5">
                                        {players.map(p => (
                                            <button key={p.name} disabled={!isOwner} onClick={() => toggleWinner(p.name)} className={`py-3 rounded-xl text-xs font-bold border transition-all ${winners.includes(p.name) ? 'bg-emerald-500/20 border-emerald-500 text-emerald-300 shadow-md font-extrabold scale-[1.01]' : 'bg-slate-950/40 border-slate-800/60 text-slate-400 hover:border-slate-700'}`}>{p.name}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <p className="text-[10px] text-red-400 font-heading font-black uppercase text-center tracking-widest">Verlierer</p>
                                    <div className="flex flex-col gap-1.5">
                                        {players.map(p => (
                                            <button key={p.name} disabled={!isOwner} onClick={() => toggleLoser(p.name)} className={`py-3 rounded-xl text-xs font-bold border transition-all ${losers.includes(p.name) ? 'bg-red-500/20 border-red-500 text-red-300 shadow-md font-extrabold scale-[1.01]' : 'bg-slate-950/40 border-slate-800/60 text-slate-400 hover:border-slate-700'}`}>{p.name}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-3 pt-2">
                                <div className="relative flex-1 max-w-[120px]">
                                    <input type="number" disabled={!isOwner} className="w-full bg-slate-950 rounded-xl py-3.5 text-center font-bold text-xl border border-slate-800 outline-none focus:border-emerald-500 text-emerald-400 pr-4" value={points} onChange={e => setPoints(e.target.value)} />
                                    <span className="absolute right-2.5 top-1/2 -translate-y-1/2 font-mono text-[10px] text-slate-600 font-bold">ct</span>
                                </div>
                                <button onClick={recordGame} className="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-950 rounded-xl font-black text-xs font-heading tracking-widest hover:brightness-110 transition-all shadow-xl active:scale-[0.98] disabled:opacity-40 uppercase">Eintragen</button>
                            </div>
                        </div>
                    </div>

                    {/* GRAPH PROGRESSION */}
                    {gameCount > 0 && (
                        <div className="bg-slate-900/20 p-4 md:p-6 rounded-3xl shadow-xl border border-slate-800/40 h-96 relative overflow-hidden">
                            <h3 className="text-[10px] font-heading font-black uppercase tracking-[0.2em] text-slate-500 mb-6 text-center">Profit / Verlust Verlauf</h3>
                            <ResponsiveContainer width="100%" height="88%">
                                <LineChart data={chartData} margin={{ top: 5, right: 10, left: -20, bottom: 5 }}>
                                    <CartesianGrid strokeDasharray="6 6" stroke="#1e293b" vertical={false} />
                                    <XAxis dataKey="name" stroke="#475569" fontSize={10} axisLine={false} tickLine={false} />
                                    <YAxis stroke="#475569" fontSize={10} axisLine={false} tickLine={false} tickFormatter={v => `${(v/100).toFixed(1)}€`} />
                                    <Tooltip
                                        contentStyle={{ backgroundColor: '#020617', border: '1px solid #1e293b', borderRadius: '16px', padding: '12px' }}
                                        itemStyle={{ fontSize: '11px', fontWeight: 'bold' }}
                                    />
                                    <Legend wrapperStyle={{ fontSize: '11px', paddingTop: '15px' }} />
                                    {players.map((p, i) => (
                                        <Line
                                            key={p.name}
                                            type="linear"
                                            dataKey={p.name}
                                            stroke={['#10b981', '#ef4444', '#3b82f6', '#f59e0b', '#8b5cf6', '#ec4899'][i % 6]}
                                            strokeWidth={3}
                                            dot={{ r: 3, strokeWidth: 0, fill: '#fff' }}
                                            activeDot={{ r: 5, strokeWidth: 0 }}
                                            animationDuration={500}
                                        />
                                    ))}
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    )}

                    {/* STATISTIK PRO SPIELER – MIT SOLO/SAUSPIEL QUOTEN */}
                    {gameLogs.length > 0 && (
                        <div className="bg-slate-900/40 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-slate-800/60 space-y-4">
                            <h3 className="text-xs font-heading font-bold uppercase text-slate-400 tracking-widest text-center md:text-left">Kader-Analysen / Einzelauswertungen</h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                {players.map((p, i) => {
                                    const pLogs = gameLogs.filter(l => l.name === p.name);
                                    const totalGames = pLogs.length;
                                    const wins = pLogs.filter(l => l.change > 0).length;
                                    const winRate = totalGames > 0 ? ((wins / totalGames) * 100).toFixed(0) : 0;

                                    const soloLogs = pLogs.filter(l => l.mode === 'solo');
                                    const totalSolo = soloLogs.length;
                                    const soloWins = soloLogs.filter(l => l.change > 0).length;
                                    const soloRate = totalSolo > 0 ? ((soloWins / totalSolo) * 100).toFixed(0) : null;

                                    const sausLogs = pLogs.filter(l => l.mode === 'normal');
                                    const totalSaus = sausLogs.length;
                                    const sausWins = sausLogs.filter(l => l.change > 0).length;
                                    const sausRate = totalSaus > 0 ? ((sausWins / totalSaus) * 100).toFixed(0) : null;

                                    const maxWin = pLogs.length > 0 ? Math.max(...pLogs.map(l => l.change), 0) : 0;
                                    const maxLoss = pLogs.length > 0 ? Math.min(...pLogs.map(l => l.change), 0) : 0;

                                    const playerColor = ['#10b981', '#ef4444', '#3b82f6', '#f59e0b', '#8b5cf6', '#ec4899'][i % 6];

                                    return (
                                        <div key={p.name} className="bg-slate-950/60 border border-slate-900 p-4 rounded-2xl relative overflow-hidden hover:border-slate-800 transition-all">
                                            <div className="absolute top-0 left-0 w-1 h-full" style={{ backgroundColor: playerColor }}></div>
                                            <div className="flex justify-between items-center mb-3 pl-2">
                                                <span className="font-heading font-bold text-sm text-slate-200">{p.name}</span>
                                                <span className={`font-mono font-bold text-xs ${p.points >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                                    {(p.points / 100).toFixed(2)}€
                                                </span>
                                            </div>
                                            <div className="grid grid-cols-4 gap-1 pl-2 mb-3">
                                                <div className="bg-slate-900/40 p-2 rounded-xl border border-slate-900/60 text-center text-[11px] text-slate-400">
                                                    <span className="block font-mono font-bold text-slate-200 text-sm">{totalGames}</span>
                                                    Spiele
                                                </div>
                                                <div className="bg-slate-900/40 p-2 rounded-xl border border-slate-900/60 text-center text-[11px] text-slate-400">
                                                    <span className="block font-mono font-bold text-emerald-400 text-sm">{winRate}%</span>
                                                    Quote
                                                </div>
                                                <div className="bg-slate-900/40 p-2 rounded-xl border border-slate-900/60 text-center text-[11px] text-slate-400">
                                                    <span className="block font-mono font-bold text-slate-200 text-sm">{totalSolo}</span>
                                                    Solos
                                                </div>
                                                <div className="bg-slate-900/40 p-2 rounded-xl border border-slate-900/60 text-center text-[11px] text-slate-400">
                                                    <span className="block font-mono font-bold text-slate-200 text-sm">{totalSaus}</span>
                                                    Saus.
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-1.5 pl-2 mb-3">
                                                <div className="bg-purple-500/5 border border-purple-500/20 rounded-xl p-2.5 text-[10px]">
                                                    <div className="flex items-center gap-1.5 mb-1">
                                                        <div className="w-1.5 h-1.5 rounded-full bg-purple-400"></div>
                                                        <span className="text-purple-400 font-heading font-bold uppercase tracking-wider">Solo</span>
                                                    </div>
                                                    <div className="flex justify-between items-end">
                                                        <div>
                                                            <span className="block font-mono font-bold text-purple-300 text-sm">
                                                                {soloRate !== null ? `${soloRate}%` : '–'}
                                                            </span>
                                                            <span className="text-slate-500">{soloWins}/{totalSolo} Siege</span>
                                                        </div>
                                                        {soloRate !== null && (
                                                            <div className="w-8 h-8 flex items-center justify-center">
                                                                <svg viewBox="0 0 32 32" className="w-8 h-8 -rotate-90">
                                                                    <circle cx="16" cy="16" r="12" fill="none" stroke="#312e81" strokeWidth="4"/>
                                                                    <circle cx="16" cy="16" r="12" fill="none" stroke="#a78bfa" strokeWidth="4"
                                                                        strokeDasharray={`${(soloRate / 100) * 75.4} 75.4`}
                                                                        strokeLinecap="round"/>
                                                                </svg>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="bg-emerald-500/5 border border-emerald-500/20 rounded-xl p-2.5 text-[10px]">
                                                    <div className="flex items-center gap-1.5 mb-1">
                                                        <div className="w-1.5 h-1.5 rounded-full bg-emerald-400"></div>
                                                        <span className="text-emerald-400 font-heading font-bold uppercase tracking-wider">Saus.</span>
                                                    </div>
                                                    <div className="flex justify-between items-end">
                                                        <div>
                                                            <span className="block font-mono font-bold text-emerald-300 text-sm">
                                                                {sausRate !== null ? `${sausRate}%` : '–'}
                                                            </span>
                                                            <span className="text-slate-500">{sausWins}/{totalSaus} Siege</span>
                                                        </div>
                                                        {sausRate !== null && (
                                                            <div className="w-8 h-8 flex items-center justify-center">
                                                                <svg viewBox="0 0 32 32" className="w-8 h-8 -rotate-90">
                                                                    <circle cx="16" cy="16" r="12" fill="none" stroke="#064e3b" strokeWidth="4"/>
                                                                    <circle cx="16" cy="16" r="12" fill="none" stroke="#10b981" strokeWidth="4"
                                                                        strokeDasharray={`${(sausRate / 100) * 75.4} 75.4`}
                                                                        strokeLinecap="round"/>
                                                                </svg>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex justify-between items-center pt-2 border-t border-slate-900/60 pl-2 text-[10px] text-slate-500">
                                                <span>Max Win: <strong className="text-emerald-500 font-mono">+{(maxWin / 100).toFixed(2)}€</strong></span>
                                                <span>Max Loss: <strong className="text-red-500 font-mono">{(maxLoss / 100).toFixed(2)}€</strong></span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* ── DUO / MITSPIELERN STATISTIKEN ── */}
                    {(duoStats.length > 0 || soloMatchups.length > 0) && (
                        <div className="bg-slate-900/40 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-slate-800/60 space-y-6">
                            <h3 className="text-xs font-heading font-bold uppercase text-slate-400 tracking-widest text-center md:text-left">Chemie-Analyse / Mitspielern-Quoten</h3>
                            {duoStats.length > 0 && (
                                <div className="space-y-3">
                                    <div className="flex items-center gap-2">
                                        <div className="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                                        <p className="text-[10px] font-heading font-bold uppercase text-emerald-400 tracking-widest">Sauspiel-Duos</p>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        {duoStats.map((d, i) => {
                                            const rate = Math.round((d.wins / d.games) * 100);
                                            const isHot = rate >= 60;
                                            const isCold = rate <= 40;
                                            return (
                                                <div key={i} className="flex items-center gap-3 bg-slate-950/60 border border-slate-900 hover:border-slate-800 transition-all px-4 py-3 rounded-2xl">
                                                    <div className="flex -space-x-2 shrink-0">
                                                        <div className="w-7 h-7 rounded-full bg-slate-800 border-2 border-slate-950 flex items-center justify-center text-[9px] font-bold text-slate-300">{d.p1.slice(0,2).toUpperCase()}</div>
                                                        <div className="w-7 h-7 rounded-full bg-slate-800 border-2 border-slate-950 flex items-center justify-center text-[9px] font-bold text-slate-300">{d.p2.slice(0,2).toUpperCase()}</div>
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <span className="text-xs font-bold text-slate-300 truncate block">{d.p1} <span className="text-slate-600 font-normal">&amp;</span> {d.p2}</span>
                                                        <span className="text-[10px] text-slate-500">{d.wins}W / {d.games - d.wins}L &middot; {d.games} Spiele</span>
                                                    </div>
                                                    <div className="text-right shrink-0">
                                                        <span className={`font-mono font-black text-sm block ${isHot ? 'text-emerald-400' : isCold ? 'text-red-400' : 'text-slate-300'}`}>{rate}%</span>
                                                        <div className="w-16 h-1.5 bg-slate-800 rounded-full mt-1 overflow-hidden">
                                                            <div className={`h-full rounded-full transition-all ${isHot ? 'bg-emerald-500' : isCold ? 'bg-red-500' : 'bg-slate-500'}`} style={{ width: `${rate}%` }}></div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                            {soloMatchups.length > 0 && (
                                <div className="space-y-3">
                                    <div className="flex items-center gap-2">
                                        <div className="w-1.5 h-1.5 rounded-full bg-purple-400"></div>
                                        <p className="text-[10px] font-heading font-bold uppercase text-purple-400 tracking-widest">Solo Head-to-Head</p>
                                        <span className="text-[9px] text-slate-600 normal-case font-normal font-sans">· zählt nur wenn einer der beiden als Solist gespielt hat</span>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        {soloMatchups.map((m, i) => {
                                            const total = m.wins_pA + m.wins_pB;
                                            const barA = total > 0 ? Math.round((m.wins_pA / total) * 100) : 50;
                                            const barB = 100 - barA;
                                            const leader = m.wins_pA > m.wins_pB ? m.pA : m.wins_pB > m.wins_pA ? m.pB : null;
                                            return (
                                                <div key={i} className="bg-slate-950/60 border border-slate-900 hover:border-slate-800 transition-all px-4 py-3 rounded-2xl space-y-2.5">
                                                    <div className="flex items-center justify-between gap-2">
                                                        <div className="flex items-center gap-2 min-w-0">
                                                            <div className={`w-7 h-7 rounded-full flex items-center justify-center text-[9px] font-bold shrink-0 ${leader === m.pA ? 'bg-purple-500/30 border border-purple-400/50 text-purple-200' : 'bg-slate-800 border border-slate-700 text-slate-300'}`}>{m.pA.slice(0,2).toUpperCase()}</div>
                                                            <span className={`text-xs font-bold truncate ${leader === m.pA ? 'text-purple-300' : 'text-slate-400'}`}>{m.pA}</span>
                                                        </div>
                                                        <div className="flex items-center gap-1.5 shrink-0">
                                                            <span className={`font-mono font-black text-sm ${leader === m.pA ? 'text-purple-300' : 'text-slate-400'}`}>{m.wins_pA}</span>
                                                            <span className="text-slate-700 font-mono text-xs">–</span>
                                                            <span className={`font-mono font-black text-sm ${leader === m.pB ? 'text-purple-300' : 'text-slate-400'}`}>{m.wins_pB}</span>
                                                        </div>
                                                        <div className="flex items-center gap-2 min-w-0 justify-end">
                                                            <span className={`text-xs font-bold truncate text-right ${leader === m.pB ? 'text-purple-300' : 'text-slate-400'}`}>{m.pB}</span>
                                                            <div className={`w-7 h-7 rounded-full flex items-center justify-center text-[9px] font-bold shrink-0 ${leader === m.pB ? 'bg-purple-500/30 border border-purple-400/50 text-purple-200' : 'bg-slate-800 border border-slate-700 text-slate-300'}`}>{m.pB.slice(0,2).toUpperCase()}</div>
                                                        </div>
                                                    </div>
                                                    <div className="h-2 bg-slate-800 rounded-full overflow-hidden flex">
                                                        <div className="h-full bg-purple-500 transition-all rounded-l-full" style={{ width: `${barA}%` }}></div>
                                                        <div className="h-full bg-slate-600 transition-all rounded-r-full" style={{ width: `${barB}%` }}></div>
                                                    </div>
                                                    <div className="flex justify-between text-[9px] text-slate-600">
                                                        <span>{barA}%</span>
                                                        <span>{m.games} Solo-Begegnungen</span>
                                                        <span>{barB}%</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* TOP 5 GEWINNE & VERLUSTE */}
                    {gameLogs.length > 0 && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-slate-900/40 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-slate-800/60 space-y-4">
                                <div className="flex items-center gap-2 mb-1">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500"></div>
                                    <h3 className="text-xs font-heading font-bold uppercase text-slate-400 tracking-widest">Top 5 Gewinne</h3>
                                </div>
                                {topWins.length === 0 ? (
                                    <p className="text-xs text-slate-500 italic text-center py-4">Noch keine Gewinne</p>
                                ) : (
                                    <div className="space-y-2">
                                        {topWins.map((log, idx) => (
                                            <div key={idx} className="flex items-center gap-3 bg-slate-950/50 px-3 py-2.5 rounded-xl border border-slate-900 hover:border-slate-800 transition-all">
                                                <span className="text-[10px] font-mono font-bold text-slate-600 w-4">{idx + 1}</span>
                                                <div className="flex-1 min-w-0">
                                                    <span className="font-bold text-slate-300 text-xs truncate block">{log.name}</span>
                                                    <div className="flex items-center gap-1.5 mt-0.5">
                                                        <span className="text-[9px] text-slate-600">Runde {log.round}</span>
                                                        <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-md ${log.mode === 'solo' ? 'bg-purple-500/10 text-purple-400' : 'bg-emerald-500/10 text-emerald-500'}`}>
                                                            {log.mode === 'solo' ? 'Solo' : 'Sauspiel'}
                                                        </span>
                                                    </div>
                                                </div>
                                                <span className="font-mono font-black text-emerald-400 text-sm shrink-0">
                                                    +{(log.change / 100).toFixed(2)}€
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <div className="bg-slate-900/40 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-slate-800/60 space-y-4">
                                <div className="flex items-center gap-2 mb-1">
                                    <div className="w-2 h-2 rounded-full bg-red-500"></div>
                                    <h3 className="text-xs font-heading font-bold uppercase text-slate-400 tracking-widest">Top 5 Verluste</h3>
                                </div>
                                {topLosses.length === 0 ? (
                                    <p className="text-xs text-slate-500 italic text-center py-4">Noch keine Verluste</p>
                                ) : (
                                    <div className="space-y-2">
                                        {topLosses.map((log, idx) => (
                                            <div key={idx} className="flex items-center gap-3 bg-slate-950/50 px-3 py-2.5 rounded-xl border border-slate-900 hover:border-slate-800 transition-all">
                                                <span className="text-[10px] font-mono font-bold text-slate-600 w-4">{idx + 1}</span>
                                                <div className="flex-1 min-w-0">
                                                    <span className="font-bold text-slate-300 text-xs truncate block">{log.name}</span>
                                                    <div className="flex items-center gap-1.5 mt-0.5">
                                                        <span className="text-[9px] text-slate-600">Runde {log.round}</span>
                                                        <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-md ${log.mode === 'solo' ? 'bg-purple-500/10 text-purple-400' : 'bg-red-500/10 text-red-500'}`}>
                                                            {log.mode === 'solo' ? 'Solo' : 'Sauspiel'}
                                                        </span>
                                                    </div>
                                                </div>
                                                <span className="font-mono font-black text-red-400 text-sm shrink-0">
                                                    {(log.change / 100).toFixed(2)}€
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
